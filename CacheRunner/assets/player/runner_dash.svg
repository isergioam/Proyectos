<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 68" width="58" height="68">
  <defs>
    <linearGradient id="duckBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE042" />
      <stop offset="100%" stop-color="#FFB000" />
    </linearGradient>
    <linearGradient id="duckBeak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E2C" />
      <stop offset="100%" stop-color="#FF5E00" />
    </linearGradient>
  </defs>
  
  <!-- Left Foot / Leg (Swept back horizontally) -->
  <path d="M12,42 L2,44 L0,41 L0,39 L2,38 L12,40 Z" fill="#E65100" />
  
  <!-- Right Foot / Leg (Swept back horizontally) -->
  <path d="M14,46 L4,48 L2,45 L2,43 L4,42 L14,44 Z" fill="#FF7A00" />

  <!-- Duck Body (stretched horizontally, rotated forward) -->
  <g transform="rotate(-15 28 34)">
    <path d="M6,34 C6,24 16,18 28,18 C40,18 46,24 46,34 C46,42 40,46 28,46 C16,46 6,42 6,34 Z" fill="url(#duckBody)" />
    
    <!-- Duck Head (pushed forward) -->
    <circle cx="38" cy="18" r="13" fill="url(#duckBody)" />
    
    <!-- Neck -->
    <path d="M30,22 C30,22 33,32 38,30 C43,28 42,22 42,22 Z" fill="url(#duckBody)" />
    
    <!-- Cheek -->
    <circle cx="35" cy="20" r="3" fill="#FF8787" opacity="0.8" />
    
    <!-- Beak (pointed straight forward, determined) -->
    <path d="M49,17 C49,17 56,17 58,19 C56,21 49,21 49,17 Z" fill="url(#duckBeak)" />
    
    <!-- Sunglasses -->
    <rect x="32" y="10" width="20" height="6" rx="1" fill="#1E293B" />
    <path d="M32,11 L26,14" stroke="#1E293B" stroke-width="2" />
    <line x1="37" y1="11" x2="39" y2="15" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
    <line x1="45" y1="11" x2="47" y2="15" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Wing (Swept backward) -->
    <path d="M12,32 C6,34 2,30 4,24 C6,18 14,24 12,32 Z" fill="#FFE042" stroke="#E5A900" stroke-width="1" />
  </g>
</svg>
