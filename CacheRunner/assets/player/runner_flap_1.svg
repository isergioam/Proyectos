<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 68" width="58" height="68">
  <defs>
    <linearGradient id="duckBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE042" />
      <stop offset="100%" stop-color="#FFB000" />
    </linearGradient>
    <linearGradient id="duckBeak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E2C" />
      <stop offset="100%" stop-color="#FF5E00" />
    </linearGradient>
  </defs>
  
  <!-- Left Foot / Leg (Kicking down) -->
  <path d="M14,50 L10,62 L4,63 L4,60 L8,58 L12,50 Z" fill="#E65100" />
  
  <!-- Right Foot / Leg (Kicking up) -->
  <path d="M26,48 L22,58 L16,59 L16,56 L20,54 L24,48 Z" fill="#FF7A00" />

  <!-- Duck Body -->
  <path d="M12,38 C12,28 18,22 28,22 C38,22 40,28 40,38 C40,46 36,50 28,50 C18,50 12,46 12,38 Z" fill="url(#duckBody)" />
  
  <!-- Duck Head -->
  <circle cx="34" cy="18" r="13" fill="url(#duckBody)" />
  
  <!-- Connection / Neck fill -->
  <path d="M26,22 C26,22 29,32 34,30 C39,28 38,22 38,22 Z" fill="url(#duckBody)" />
  
  <!-- Cute Pink Cheek -->
  <circle cx="31" cy="20" r="3" fill="#FF8787" opacity="0.8" />
  
  <!-- Beak (focused, open slightly) -->
  <path d="M45,17 C45,17 53,16 55,19 C56,20 53,23 45,22 Z" fill="url(#duckBeak)" />
  
  <!-- Sunglasses -->
  <rect x="28" y="10" width="20" height="6" rx="1" fill="#1E293B" />
  <path d="M28,11 L22,14" stroke="#1E293B" stroke-width="2" />
  <line x1="33" y1="11" x2="35" y2="15" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
  <line x1="41" y1="11" x2="43" y2="15" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Wing (Flapped UP) -->
  <path d="M18,34 C20,18 28,16 28,26 C28,36 22,38 18,34 Z" fill="#FFE042" stroke="#E5A900" stroke-width="1" />
</svg>
