<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 68" width="58" height="68">
  <defs>
    <linearGradient id="duckBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEFA0" />
      <stop offset="100%" stop-color="#E59900" />
    </linearGradient>
    <linearGradient id="duckBeak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E2C" />
      <stop offset="100%" stop-color="#D32F2F" />
    </linearGradient>
  </defs>
  
  <!-- Spinning / Dizzy stars or shock lines -->
  <path d="M12,8 L15,11 M22,4 L22,8 M32,5 L30,9" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <circle cx="13" cy="9" r="1" fill="#FFD700" />
  <circle cx="22" cy="6" r="1.2" fill="#FFD700" />

  <!-- Left Foot / Leg (pointing up, knocked over) -->
  <path d="M12,46 L6,40 L9,37 L14,43 Z" fill="#D84315" />
  
  <!-- Right Foot / Leg (pointing up, knocked over) -->
  <path d="M22,46 L18,38 L21,35 L25,42 Z" fill="#D84315" />

  <!-- Duck Body (collapsed / rotated slightly) -->
  <g transform="rotate(25 28 38)">
    <path d="M10,34 C10,24 18,20 28,20 C38,20 42,26 42,34 C42,40 36,44 28,44 C16,44 10,40 10,34 Z" fill="url(#duckBody)" />
    
    <!-- Duck Head (knocked back) -->
    <circle cx="34" cy="14" r="13" fill="url(#duckBody)" />
    
    <!-- Neck -->
    <path d="M26,18 C26,18 29,28 34,26 C39,24 38,18 38,18 Z" fill="url(#duckBody)" />
    
    <!-- Dizzy Cheek -->
    <circle cx="31" cy="18" r="3.5" fill="#FF5252" opacity="0.6" />
    
    <!-- XX Eyes (knocked out) -->
    <path d="M26,9 L30,13 M30,9 L26,13" stroke="#212529" stroke-width="2.5" stroke-linecap="round" />
    <path d="M34,9 L38,13 M38,9 L34,13" stroke="#212529" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Beak (Wide open in shock) -->
    <path d="M43,14 C43,14 50,16 52,19 L44,24 Z" fill="url(#duckBeak)" />
    <path d="M45,18 L48,19 C48,20 46,22 44,22 Z" fill="#FF8A80" />
    
    <!-- Wing (broken look, pointing straight up or down) -->
    <path d="M14,32 C12,38 8,40 8,36 C8,32 12,28 14,32 Z" fill="#E59900" />
  </g>
  
  <!-- Sunglasses (Flying off!) -->
  <g transform="translate(18, -12) rotate(-45 28 12)">
    <rect x="28" y="12" width="20" height="6" rx="1" fill="#1E293B" opacity="0.85" />
    <!-- crack on lens -->
    <path d="M38,12 L38,18 M36,15 L40,15" stroke="#FFFFFF" stroke-width="0.8" />
  </g>
  
  <!-- Tiny feathers flying around -->
  <path d="M2,24 C1,22 3,20 4,21 C5,22 3,24 2,24 Z" fill="#FFE042" opacity="0.9" />
  <path d="M52,38 C51,36 53,34 54,35 C55,36 53,38 52,38 Z" fill="#FFE042" opacity="0.8" />
</svg>
